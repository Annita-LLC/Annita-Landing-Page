# ============================================================================
# ANNITA LANDING PAGE SERVER - RAILWAY DEPLOYMENT CONFIGURATION
# ============================================================================
# Fortune 500 / Pentagon Grade Deployment
# ============================================================================

[build]
builder = "NIXPACKS"

[build.env]
NPM_FLAGS = "--production=false"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "npm run build && npm start"

[[services]]
name = "landing-page-server"
description = "Annita Landing Page API Server"

[services.env]
NODE_ENV = "production"
PORT = "3001"
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"

[services.ports]
port = 3001
type = "HTTP"

[[services.ports.checks]]
interval = 30
gracePeriod = 10
timeout = 5
type = "TCP"

[deploy.healthcheck]
path = "/health"
timeout = 300

