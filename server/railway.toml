# ============================================================================
# ANNITA LANDING PAGE SERVER - RAILWAY DEPLOYMENT CONFIGURATION
# ============================================================================
# Fortune 500 / Pentagon Grade Deployment
# ============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.env]
# Enterprise-grade build configuration
NPM_FLAGS = "--production=false"
NODE_ENV = "production"

# Pre-deploy command for database migrations
# Note: Migrations run in start command instead to ensure database connectivity
[deploy]
startCommand = "npx prisma@7 migrate deploy && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Service configuration
[[services]]
name = "landing-page-server"
description = "Annita Landing Page API Server - Enterprise Grade"

[services.env]
NODE_ENV = "production"
PORT = "8080"
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"
# DATABASE_URL should be set in Railway dashboard (Variables tab) for security
# Do not commit secrets to railway.toml

# Enterprise security headers
CORS_ORIGIN = "https://www.an-nita.com,https://an-nita.com,https://*.railway.app"
CORS_CREDENTIALS = "true"
RATE_LIMIT_WINDOW_MS = "900000"
RATE_LIMIT_MAX_REQUESTS = "100"
RATE_LIMIT_BURST_LIMIT = "150"

[services.ports]
port = 8080
type = "HTTP"
publicPort = 8080

# Health check configuration with enterprise-grade monitoring
[[services.ports.checks]]
interval = 30
gracePeriod = 10
timeout = 5
type = "TCP"

# Additional HTTP health check
[[services.ports.checks]]
interval = 30
gracePeriod = 10
timeout = 5
type = "HTTP"
path = "/health"

# Production environment overrides
[environments.production]
[environments.production.build]
builder = "RAILPACK"
railpackVersion = "1.0.0"

[environments.production.deploy]
startCommand = "npx prisma@7 migrate deploy && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

