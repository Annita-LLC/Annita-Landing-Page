# ==============================================================================
# FORTUNE 500 / PENTAGON-GRADE NETLIFY CONFIGURATION
# PROJECT: ANNITA LANDING PAGE
# ==============================================================================
# This file is the single source of truth for Netlify deployments.
# It mirrors the security posture enforced in next.config.js and the Dockerfile,
# ensuring parity across Vercel, Docker, and Netlify targets.
# ------------------------------------------------------------------------------

[build]
  # Next.js build command. Netlify's OpenNext adapter runs automatically.
  command = "npm run build"
  # Directory published by Next.js (adapter handles routing).
  publish = ".next"
  # Functions are auto-provisioned by the OpenNext adapter.
  functions = ".netlify/functions"

[build.environment]
  # Pin Node.js to an LTS version matching the Dockerfile for parity.
  NODE_VERSION = "20"
  # Use npm matching the lockfile.
  NPM_FLAGS = "--legacy-peer-deps"
  # Disable Next.js telemetry in CI for reproducible, quiet builds.
  NEXT_TELEMETRY_DISABLED = "1"
  # Enable skew protection to avoid client/server version drift across deploys.
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

  # ----------------------------------------------------------------------------
  # Public runtime environment variables (from .env.production)
  # These are NEXT_PUBLIC_* so they are inlined at build time.
  # ----------------------------------------------------------------------------
  NEXT_PUBLIC_CLIENT_URL = "https://annita-v1.vercel.app"
  NEXT_PUBLIC_API_URL = "https://api.an-nita.com"
  NEXT_PUBLIC_LANDING_PAGE_URL = "https://annita-landing-page-production.up.railway.app"

  # Company & Branding
  NEXT_PUBLIC_COMPANY_NAME = "Annita LLC"
  NEXT_PUBLIC_COMPANY_TAGLINE = "Africa's Digital Heartbeat"
  NEXT_PUBLIC_COMPANY_ADDRESS = "Monrovia, Liberia"
  NEXT_PUBLIC_COMPANY_PHONE = "+231 77 505 7227"
  NEXT_PUBLIC_COMPANY_EMAIL = "info@an-nita.com"
  NEXT_PUBLIC_COMPANY_WEBSITE = "https://www.an-nita.com"

  # Support Contacts
  NEXT_PUBLIC_SUPPORT_EMAIL = "support@an-nita.com"
  NEXT_PUBLIC_ENTERPRISE_EMAIL = "enterprise@an-nita.com"
  NEXT_PUBLIC_SECURITY_EMAIL = "security@an-nita.com"

  # Social Media Links
  NEXT_PUBLIC_SOCIAL_FACEBOOK = "https://web.facebook.com/annitallc/"
  NEXT_PUBLIC_SOCIAL_INSTAGRAM = "https://www.instagram.com/annita_llc/"
  NEXT_PUBLIC_SOCIAL_LINKEDIN = "https://www.linkedin.com/feed/update/urn:li:activity:7328629052678823938"
  NEXT_PUBLIC_SOCIAL_YOUTUBE = "https://youtube.com/@annita_llc"
  NEXT_PUBLIC_SOCIAL_WHATSAPP = "https://wa.me/231775057227"
  NEXT_PUBLIC_SOCIAL_TIKTOK = "https://www.tiktok.com/@annita_llc"

# ------------------------------------------------------------------------------
# Security headers (mirror next.config.js for Defense-in-Depth on the edge)
# ------------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-DNS-Prefetch-Control = "on"

# ------------------------------------------------------------------------------
# Caching for immutable, hashed build assets (safe + fast)
# ------------------------------------------------------------------------------
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ------------------------------------------------------------------------------
# Long-cache for fonts and other static public assets
# ------------------------------------------------------------------------------
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ------------------------------------------------------------------------------
# Redirects (canonical host / trailing slash normalization)
# ------------------------------------------------------------------------------
# Force HTTPS and trim www. Uncomment and edit the domain when wired up.
# [[redirects]]
#   from = "https://www.an-nita.com/*"
#   to = "https://an-nita.com/:splat"
#   status = 301
#   force = true

# ------------------------------------------------------------------------------
# SPA-style fallback is NOT needed for Next.js on Netlify (adapter handles it).
# Keep this file minimal and let the OpenNext adapter own routing.
# ------------------------------------------------------------------------------
